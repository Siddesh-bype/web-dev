<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color:gray; /* White */
    }
    .content {
      background-color:#232629; /* White */
      display: grid;
      width: 748px;
      height: 748px;

      grid-template-columns: 320px 360px 50px;
      grid-template-rows: 414px 296px 20px;
      gap: 9px; /* Gap Colour */
    }
    .item1 {
      background-color: #E72F24; /* White */
    }.item2 {
      background-color: #F0F1EC; /* White */
      grid-column-start: 2;
      grid-column-end: 4;
    }
    .item3 {
      background-color: #F0F1EC; /* White */
    }
    .item4 {
      background-color: #F0F1EC; /* White */
    }
    .item5 {
      grid-area:2/3/4/4 ;
      display: grid;
      gap: 10px; /* Gap Colour */
      grid-template-rows: 130px ;
      grid-template-columns: 50px;
    }  
    .item5-1 {
      background-color: #004592; /* Blue */
    }
    .item5-2 {
      background-color: #F0F1EC; /* White */
    }
    .item6 {
      background-color: #F0F1EC; /* White */
    }
    .item7 {
      
      display: grid;
      gap: 9px; /* Gap Colour */
      grid-template-rows: 20px;
      grid-template-columns: 198px 153px;
    }
    .item7-1 {
      background-color: #F9D01E; /* Yellow */
    }
    .item2-2 {
      background-color:#232629;
    }

  </style>
</head>
<body>
  <!-- Write your HTML here -->
  <div class="content">
    <div class="item1"></div>
    <div class="item2"></div>
    <div class="item3"></div>
    <div class="item4"></div>
    <div class="item5">
      <div class="item5-1"></div>
      <div class="item5-2"></div>
    </div>
    <div class="item6"></div>
    <div class="item7">
      <div class="item7-1"></div>
      <div class="item7-2"></div>
    </div>
    
  </div>
</body>

</html>
